<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Mode – SAP S/4HANA Preparation</title>
    <meta name="description" content="Deep-dive study notes for SAP S/4HANA & MM concepts.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ── Study page chrome ─────────────────────────── */
        .study-chrome {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        /* Top bar: back + day label */
        .study-topbar {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .back-btn {
            flex-shrink: 0;
            background: rgba(255,255,255,.08);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: all .3s ease;
            text-decoration: none;
        }
        .back-btn:hover { background: var(--sap-blue); border-color: var(--sap-blue); transform: translateX(-4px); }

        .study-meta { flex: 1; }
        .study-meta .day-phase { font-size: .78rem; text-transform: uppercase; letter-spacing: .12em; color: var(--sap-blue); font-weight: 600; }
        .study-meta h1 { font-size: 1.6rem; font-weight: 700; margin-top: .25rem; }

        /* Day progress bar */
        .day-progress-wrap {
            background: rgba(255,255,255,.07);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem 1.4rem;
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }
        .day-progress-label {
            display: flex;
            justify-content: space-between;
            font-size: .85rem;
            color: var(--text-secondary);
        }
        .day-progress-track {
            height: 8px;
            background: rgba(255,255,255,.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .day-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--sap-blue), var(--accent-neon));
            transition: width .5s ease;
        }

        /* Prev / Next navigation */
        .study-nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .55rem 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: .88rem;
            font-weight: 600;
            background: rgba(255,255,255,.05);
            transition: all .25s ease;
        }
        .nav-btn:hover { background: rgba(0,143,211,.15); border-color: var(--sap-blue); color: var(--text-primary); }

        /* ── Concept cards ──────────────────────────────── */
        .concept-card {
            margin-bottom: 2rem;
            padding: 0;
            overflow: hidden;
        }
        .concept-header {
            padding: 1.4rem 2rem 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: .3rem;
        }
        .concept-index {
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .1em;
            color: var(--sap-blue);
            text-transform: uppercase;
        }
        .concept-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent-neon);
        }
        .concept-content {
            padding: 1.5rem 2rem;
            line-height: 1.8;
            color: #CBD5E1;
        }
        .concept-content h3 {
            color: var(--text-primary);
            font-size: 1.05rem;
            font-weight: 700;
            margin: 1.4rem 0 .6rem;
        }
        .concept-content ul, .concept-content ol {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }
        .concept-content li { margin-bottom: .45rem; }
        .concept-content strong { color: #93C5FD; }
        .concept-content p  { margin-bottom: .9rem; }
        .concept-content table {
            width: 100%; border-collapse: collapse; margin: 1rem 0;
        }
        .concept-content th, .concept-content td {
            border: 1px solid var(--border-color);
            padding: .6rem .9rem;
            text-align: left;
            font-size: .88rem;
        }
        .concept-content th { color: var(--sap-blue); background: rgba(0,143,211,.08); }

        /* Hero-tip block (auto-detected or manually added) */
        .hero-tip {
            background: rgba(16,185,129,.08);
            border-left: 4px solid var(--success);
            border-radius: 0 8px 8px 0;
            padding: .8rem 1.2rem;
            margin: 1rem 0;
            color: #A7F3D0;
            font-size: .92rem;
        }
        .hero-tip strong { color: #6EE7B7; }

        /* Complete button */
        .concept-footer {
            padding: 1rem 2rem 1.5rem;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid var(--border-color);
        }
        .complete-btn {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .6rem 1.6rem;
            border: 1.5px solid var(--sap-blue);
            border-radius: 24px;
            color: var(--sap-blue);
            background: transparent;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: .9rem;
            font-weight: 600;
            transition: all .3s ease;
        }
        .complete-btn:hover { background: rgba(0,143,211,.12); }
        .complete-btn.completed {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .concept-header, .concept-content, .concept-footer { padding-left: 1.2rem; padding-right: 1.2rem; }
            .study-meta h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="glow glow-3"></div>
    </div>

    <div class="container">

        <!-- ── Header chrome ─────────────────────────────── -->
        <div class="study-chrome">

            <!-- Back + Title -->
            <div class="study-topbar">
                <a href="index.html" class="back-btn" aria-label="Back to Dashboard">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="study-meta">
                    <span class="day-phase" id="study-phase">Loading…</span>
                    <h1 id="study-title">Loading Day Content…</h1>
                </div>
            </div>

            <!-- Per-day progress bar -->
            <div class="day-progress-wrap">
                <div class="day-progress-label">
                    <span>Day Progress</span>
                    <span id="day-progress-text">0 / 0 concepts complete</span>
                </div>
                <div class="day-progress-track">
                    <div class="day-progress-fill" id="day-progress-bar"></div>
                </div>
            </div>

        </div>

        <!-- ── Prev / Next Navigation ─────────────────────── -->
        <div class="study-nav">
            <a href="#" class="nav-btn" id="prev-day-btn">
                <i class="fas fa-arrow-left"></i> Previous Day
            </a>
            <a href="#" class="nav-btn" id="next-day-btn">
                Next Day <i class="fas fa-arrow-right"></i>
            </a>
        </div>

        <!-- ── Loading Spinner ────────────────────────────── -->
        <div id="loading-spinner" style="text-align:center;padding:4rem 0;">
            <i class="fas fa-circle-notch fa-spin fa-3x" style="color:var(--sap-blue);"></i>
            <p style="margin-top:1rem;color:var(--text-secondary);">Loading study materials…</p>
        </div>

        <!-- ── Concepts injected here ─────────────────────── -->
        <main id="concepts-container"></main>

    </div>

    <script type="module" src="js/study.js"></script>
</body>
</html>
